name: Supabase keepalive

# Evita che l'inattivita' prolungata metta in pausa il progetto.
#  1) Supabase (free): pausa dopo ~7 giorni senza richieste -> ping REST
#     (URL + anon key presi dai secret VITE_SUPABASE_*).
#  2) GitHub Actions: i workflow schedulati vengono disabilitati dopo 60
#     giorni senza attivita' sul repo -> scriviamo un timestamp sul branch
#     separato "keepalive" (non tocca il deploy su gh-pages).
on:
  schedule:
    - cron: '41 6 */3 * *'   # ogni 3 giorni, 06:41 UTC
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase (REST) per evitare la pausa da inattivita'
        env:
          URL: ${{ secrets.VITE_SUPABASE_URL }}
          ANON: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$URL" ] || [ -z "$ANON" ]; then echo "::warning::Secret Supabase mancanti"; exit 0; fi
          code=$(curl -s -o /dev/null -w "%{http_code}" "$URL/rest/v1/turnisti?select=id&limit=1" -H "apikey: $ANON" -H "Authorization: Bearer $ANON")
          echo "Supabase REST -> HTTP $code"
          if [ "$code" != "200" ] && [ "$code" != "206" ]; then echo "::warning::Supabase ha risposto $code"; fi

      - name: Timestamp sul branch keepalive (tiene attivo il repo)
        env:
          GH: ${{ secrets.KEEPALIVE_PAT }}
        run: |
          OWNER=gmedicaguidonia-prog; REPO=guardia-medica; BR=keepalive; FILE=last-ping.txt
          TS=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          CONTENT=$(printf "%s\n" "$TS" | base64 -w0)
          SHA=$(curl -s -H "Authorization: Bearer $GH" "https://api.github.com/repos/$OWNER/$REPO/contents/$FILE?ref=$BR" | grep -oE '"sha": ?"[0-9a-f]{40}"' | head -1 | cut -d'"' -f4)
          curl -s -X PUT -H "Authorization: Bearer $GH" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$OWNER/$REPO/contents/$FILE" \
            -d "{\"message\":\"keepalive $TS\",\"content\":\"$CONTENT\",\"branch\":\"$BR\",\"sha\":\"$SHA\"}" \
            -o /dev/null -w "GitHub contents PUT -> %{http_code}\n"
