<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <title>Guardia Medica</title>
    <!-- SPA fallback per GitHub Pages: converte il path in query string e
         rimanda all'index.html del progetto, che lo ripristina (vedi index.html).
         pathSegmentsToKeep = 1 perché il sito sta in /<repo>/. -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
